<!-- @dsCard group="Type" viewport="700x260" name="UI — Geist" subtitle="Headings, body, labels. Excellent legibility, few weights" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--paper); font-family:var(--font-sans); }
  .h1 { font-size:28px; font-weight:600; letter-spacing:-0.02em; color:var(--ink-900); }
  .h2 { font-size:22px; font-weight:600; letter-spacing:-0.02em; color:var(--ink-900); margin-top:6px; }
  .h3 { font-size:18px; font-weight:600; color:var(--ink-900); margin-top:6px; }
  .body { font-size:16px; line-height:1.5; color:var(--ink-600); margin-top:10px; max-width:520px; }
  .sm { font-size:14px; color:var(--ink-500); margin-top:6px; }
  .cap { font-family:var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-400); margin-top:14px; }
</style></head>
<body>
<div class="h1">Osaka — Palermo</div>
<div class="h2">Barra nikkei</div>
<div class="h3">Qué pedir</div>
<div class="body">El chat con el Brain no debe sentirse como un bot genérico, sino como un concierge gastronómico que conoce la ciudad.</div>
<div class="sm">Reserva recomendada · 40 min promedio · abierto ahora</div>
<div class="cap">Geist · 400 / 500 / 600</div>
</body></html>
