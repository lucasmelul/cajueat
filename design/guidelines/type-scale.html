<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px 24px; background:var(--paper); font-family:var(--font-sans); }
  .r { display:flex; align-items:baseline; gap:14px; padding:5px 0; border-bottom:1px solid var(--line-soft); }
  .r .tok { font-family:var(--font-mono); font-size:11px; color:var(--ink-400); width:120px; flex-shrink:0; }
  .r .ex { color:var(--ink-900); }
  .serif { font-family:var(--font-serif); font-weight:400; }
</style></head>
<body>
<div class="r"><span class="tok">display / 44</span><span class="ex serif" style="font-size:34px">Ficha hero</span></div>
<div class="r"><span class="tok">editorial / 30</span><span class="ex serif" style="font-size:26px">Brain narrativo</span></div>
<div class="r"><span class="tok">h1 / 28 · 600</span><span class="ex" style="font-size:24px;font-weight:600;letter-spacing:-.02em">Título de sección</span></div>
<div class="r"><span class="tok">h2 / 22 · 600</span><span class="ex" style="font-size:20px;font-weight:600;letter-spacing:-.02em">Subtítulo</span></div>
<div class="r"><span class="tok">title / 16 · 600</span><span class="ex" style="font-size:16px;font-weight:600">Título de card</span></div>
<div class="r"><span class="tok">body / 16</span><span class="ex" style="font-size:16px;color:var(--ink-600)">Texto de cuerpo, legible y tranquilo.</span></div>
<div class="r"><span class="tok">sm / 14</span><span class="ex" style="font-size:14px;color:var(--ink-500)">Metadatos y apoyo</span></div>
<div class="r"><span class="tok">caption / 12</span><span class="ex" style="font-size:12px;color:var(--ink-400)">Etiquetas menores</span></div>
</body></html>
