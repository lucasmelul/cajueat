<!-- @dsCard group="Brand" viewport="700x240" name="Wordmark & Brain mark" subtitle="Typographic identity (no logo yet): Bricolage Grotesque + caju seed" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:30px; background:var(--paper); display:flex; align-items:center; gap:40px; }
  .wm { font-family:var(--font-display); font-weight:700; letter-spacing:-0.035em; line-height:1;
    display:inline-flex; align-items:flex-start; }
  .wm .a { color:var(--ink-900); } .wm .b { color:var(--caju-500); }
  .wm .seed { width:.4em; height:.4em; margin-left:.12em; margin-top:.06em; }
  .wm .seed path { fill:var(--caju-500); }
  .stack { display:flex; flex-direction:column; gap:20px; }
  .invert { background:var(--ink-900); padding:14px 18px; border-radius:var(--r-md); align-self:flex-start; }
  .invert .a { color:#fff; } .invert .b { color:var(--caju-300); } .invert .seed path { fill:var(--caju-300); }
  .mk { width:64px; height:64px; border-radius:26%; display:grid; place-items:center;
    background:radial-gradient(120% 120% at 30% 20%, var(--caju-400), var(--caju-600));
    box-shadow:0 8px 20px -8px rgba(219,67,26,.6), inset 0 1px 0 rgba(255,255,255,.35); }
  .mk svg { width:60%; height:60%; }
  .note { font-family:var(--font-sans); font-size:12px; color:var(--ink-400); max-width:180px; line-height:1.5; }
</style></head>
<body>
<div class="stack">
  <div class="wm" style="font-size:52px"><span class="a">Caju</span><span class="b">Eat</span>
    <svg class="seed" viewBox="0 0 24 24"><path d="M12 2.5c.5 3.7 2.3 5.5 6 6-3.7.5-5.5 2.3-6 6-.5-3.7-2.3-5.5-6-6 3.7-.5 5.5-2.3 6-6Z"/></svg></div>
  <div class="wm invert" style="font-size:26px"><span class="a">Caju</span><span class="b">Eat</span>
    <svg class="seed" viewBox="0 0 24 24"><path d="M12 2.5c.5 3.7 2.3 5.5 6 6-3.7.5-5.5 2.3-6 6-.5-3.7-2.3-5.5-6-6 3.7-.5 5.5-2.3 6-6Z"/></svg></div>
</div>
<div class="mk"><svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2.5c.5 3.7 2.3 5.5 6 6-3.7.5-5.5 2.3-6 6-.5-3.7-2.3-5.5-6-6 3.7-.5 5.5-2.3 6-6Z"/><circle cx="18.5" cy="5.5" r="1.6" opacity=".85"/></svg></div>
<div class="note">Bricolage Grotesque, dos tonos + semilla caju. Es la identidad tipográfica hasta tener una marca real. La semilla también funciona sola como presencia del Brain.</div>
</body></html>
