<!-- @dsCard group="Brand" viewport="700x240" name="Wordmark & Brain mark" subtitle="No logo yet: Bricolage Grotesque + pin/cup glyph, plus the Brain's sparkle presence" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:30px; background:var(--paper); display:flex; align-items:center; gap:40px; }
  .wm { font-family:var(--font-display); font-weight:700; letter-spacing:-0.03em; line-height:1;
    display:inline-flex; align-items:flex-start; }
  .wm .a { color:var(--ink-900); } .wm .b { color:var(--caju-500); }
  .wm .mark { width:.5em; height:.5em; margin-left:.1em; margin-top:.04em; overflow:visible; }
  .wm .pin { stroke:var(--ink-900); fill:none; }
  .wm .cup { fill:var(--caju-500); }
  .wm .handle { stroke:var(--caju-500); fill:none; }
  .stack { display:flex; flex-direction:column; gap:20px; }
  .invert { background:var(--ink-900); padding:14px 18px; border-radius:var(--r-md); align-self:flex-start; }
  .invert .a { color:#fff; } .invert .b { color:var(--caju-300); }
  .invert .pin { stroke:#fff; } .invert .cup { fill:var(--caju-300); } .invert .handle { stroke:var(--caju-300); }
  .mk { width:64px; height:64px; border-radius:26%; display:grid; place-items:center;
    background:radial-gradient(120% 120% at 30% 20%, var(--caju-400), var(--caju-600));
    box-shadow:0 8px 20px -8px rgba(219,67,26,.6), inset 0 1px 0 rgba(255,255,255,.35); }
  .mk svg { width:60%; height:60%; }
  .note { font-family:var(--font-sans); font-size:12px; color:var(--ink-400); max-width:190px; line-height:1.5; }
</style></head>
<body>
<div class="stack">
  <div class="wm" style="font-size:52px"><span class="a">Lugar</span><span class="b">cito</span>
    <svg class="mark" viewBox="0 0 24 24">
      <path class="pin" d="M12 21S5 14.8 5 9.5A7 7 0 0 1 19 9.5C19 14.8 12 21 12 21Z" stroke-width="1.6" stroke-linejoin="round"/>
      <rect class="cup" x="8.3" y="7.6" width="6.4" height="4.6" rx="1.3"/>
      <path class="handle" d="M14.9 8.6c1.1 0 1.9.8 1.9 1.8s-.8 1.8-1.9 1.8" stroke-width="1.1"/>
    </svg></div>
  <div class="wm invert" style="font-size:26px"><span class="a">Lugar</span><span class="b">cito</span>
    <svg class="mark" viewBox="0 0 24 24">
      <path class="pin" d="M12 21S5 14.8 5 9.5A7 7 0 0 1 19 9.5C19 14.8 12 21 12 21Z" stroke-width="1.6" stroke-linejoin="round"/>
      <rect class="cup" x="8.3" y="7.6" width="6.4" height="4.6" rx="1.3"/>
      <path class="handle" d="M14.9 8.6c1.1 0 1.9.8 1.9 1.8s-.8 1.8-1.9 1.8" stroke-width="1.1"/>
    </svg></div>
</div>
<div class="mk"><svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2.5c.5 3.7 2.3 5.5 6 6-3.7.5-5.5 2.3-6 6-.5-3.7-2.3-5.5-6-6 3.7-.5 5.5-2.3 6-6Z"/><circle cx="18.5" cy="5.5" r="1.6" opacity=".85"/></svg></div>
<div class="note">Wordmark: Bricolage Grotesque + glifo pin-de-mapa/taza (un "lugarcito" gastronómico). El sparkle sigue siendo la presencia del Brain dentro del producto — dos marcas, un mismo sistema, hasta tener un isotipo real.</div>
</body></html>
