<!-- @dsCard group="Colors" viewport="700x180" name="Caju — brand accent" subtitle="The one warm accent: cashew coral → amber" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--paper); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; height:88px; border-radius:var(--r-md); display:flex; flex-direction:column;
    justify-content:flex-end; padding:10px; box-shadow:var(--ring-hairline); }
  .sw b { font-family:var(--font-sans); font-size:12px; font-weight:600; }
  .sw span { font-family:var(--font-mono); font-size:10px; opacity:.7; }
  .light b, .light span { color:#fff; } .dark b, .dark span { color:var(--ink-800); }
</style></head>
<body>
<div class="row">
  <div class="sw light" style="background:var(--caju-700)"><b>caju-700</b><span>#C0350E</span></div>
  <div class="sw light" style="background:var(--caju-600)"><b>caju-600</b><span>press</span></div>
  <div class="sw light" style="background:var(--caju-500)"><b>caju-500</b><span>PRIMARY</span></div>
  <div class="sw light" style="background:var(--caju-400)"><b>caju-400</b><span>hover</span></div>
  <div class="sw dark" style="background:var(--caju-200)"><b>caju-200</b><span>#FCC9B0</span></div>
  <div class="sw dark" style="background:var(--caju-100)"><b>caju-100</b><span>tint</span></div>
  <div class="sw dark" style="background:var(--caju-050)"><b>caju-050</b><span>wash</span></div>
  <div class="sw dark" style="background:var(--amber-500)"><b>amber-500</b><span>2ndary</span></div>
</div>
</body></html>
