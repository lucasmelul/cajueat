<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base grid — respirar, poca densidad" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px 24px; background:var(--paper); font-family:var(--font-mono); }
  .r { display:flex; align-items:center; gap:14px; padding:4px 0; }
  .r .tok { font-size:11px; color:var(--ink-500); width:78px; }
  .r .bar { height:16px; background:var(--caju-200); border-radius:3px; }
  .r .px { font-size:10px; color:var(--ink-400); }
</style></head>
<body>
<div class="r"><span class="tok">space-2</span><span class="bar" style="width:4px"></span><span class="px">4</span></div>
<div class="r"><span class="tok">space-3</span><span class="bar" style="width:8px"></span><span class="px">8</span></div>
<div class="r"><span class="tok">space-5</span><span class="bar" style="width:16px"></span><span class="px">16 · gutter</span></div>
<div class="r"><span class="tok">space-7</span><span class="bar" style="width:24px"></span><span class="px">24</span></div>
<div class="r"><span class="tok">space-8</span><span class="bar" style="width:32px"></span><span class="px">32 · section</span></div>
<div class="r"><span class="tok">space-10</span><span class="bar" style="width:48px"></span><span class="px">48</span></div>
<div class="r"><span class="tok">space-11</span><span class="bar" style="width:64px"></span><span class="px">64</span></div>
</body></html>
