<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:26px 22px; background:var(--paper-sunk); display:flex; gap:20px; align-items:center; flex-wrap:wrap; }
  .c { width:120px; height:84px; background:var(--surface); border-radius:var(--r-lg); display:flex; align-items:flex-end; padding:10px; }
  .c span { font-family:var(--font-mono); font-size:10px; color:var(--ink-500); }
</style></head>
<body>
<div class="c" style="box-shadow:var(--shadow-sm)"><span>sm</span></div>
<div class="c" style="box-shadow:var(--shadow-md)"><span>md · card</span></div>
<div class="c" style="box-shadow:var(--shadow-lg)"><span>lg · float</span></div>
<div class="c" style="box-shadow:var(--shadow-xl)"><span>xl · sheet</span></div>
</body></html>
